name: 麒麟项目自动部署

on:
  push:
    branches:
      - bug/fix-code-bug-v0.2.6  # 生产分支
      - main                     # 主干分支
    tags:
      - 'v*'                     # 标签推送也触发

jobs:
  deploy:
    name: 部署到生产服务器
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/bug/fix-code-bug-v0.2.6' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: SSH 部署到服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            echo "🚀 开始部署麒麟项目..."

            # 进入项目目录
            cd /home/admin/projects/P007

            # 拉取最新代码
            git fetch --all --tags
            git checkout bug/fix-code-bug-v0.2.6
            git pull origin bug/fix-code-bug-v0.2.6

            # 安装依赖
            cd apps/backend && npm ci --only=production && cd ../..
            cd apps/frontend && npm ci && cd ../..

            # 运行数据库迁移
            cd apps/backend && npx prisma migrate deploy && cd ../..

            # 构建前端
            cd apps/frontend && npm run build && cd ../..

            # 重启服务
            pm2 restart qilin-backend
            pm2 restart qilin-frontend

            echo "✅ 部署完成!"
