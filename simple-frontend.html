<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫码点餐 - 极简版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #1890ff; margin-bottom: 10px; }
        .sections { display: flex; gap: 20px; margin-bottom: 30px; }
        .section { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 20px; }
        .section h2 { margin-bottom: 15px; color: #333; border-bottom: 2px solid #1890ff; padding-bottom: 5px; }
        .menu-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .menu-item:last-child { border-bottom: none; }
        .menu-item button { background: #1890ff; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .cart-item { display: flex; justify-content: space-between; padding: 8px 0; }
        .cart-total { font-weight: bold; margin-top: 10px; padding-top: 10px; border-top: 2px solid #333; }
        .order-status { padding: 15px; border-radius: 8px; margin-top: 20px; }
        .status-preparing { background: #fff7e6; border: 1px solid #ffd591; }
        .status-ready { background: #f6ffed; border: 1px solid #b7eb8f; }
        button { background: #1890ff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #40a9ff; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🍽️ 扫码点餐系统（极简版）</h1>
        <p>餐桌: A01 | 简单、直接、可用</p>
    </div>

    <div class="sections">
        <!-- 菜单区 -->
        <div class="section">
            <h2>📋 菜单</h2>
            <div id="menu"></div>
        </div>

        <!-- 购物车 -->
        <div class="section">
            <h2>🛒 购物车</h2>
            <div id="cart"></div>
            <div class="cart-total">总计: ¥<span id="total">0</span></div>
            <button id="submit-order" onclick="submitOrder()" disabled>提交订单</button>
        </div>
    </div>

    <!-- 订单状态 -->
    <div id="order-status" class="section hidden">
        <h2>📦 订单状态</h2>
        <div id="status-content"></div>
        <button onclick="checkOrderStatus()">刷新状态</button>
        <button onclick="markAsReady()" style="background: #52c41a;">👨‍🍳 后厨标记完成</button>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000';
        let cart = [];
        let currentOrderId = null;

        // 加载菜单
        async function loadMenu() {
            try {
                const res = await fetch(`${API_BASE}/api/menu`);
                const data = await res.json();
                renderMenu(data.data);
            } catch (error) {
                alert('加载菜单失败: ' + error.message);
            }
        }

        function renderMenu(menuData) {
            const menuDiv = document.getElementById('menu');
            menuDiv.innerHTML = '';
            
            menuData.categories.forEach(category => {
                const items = menuData.items.filter(item => item.categoryId === category.id);
                if (items.length > 0) {
                    const categoryTitle = document.createElement('h3');
                    categoryTitle.textContent = category.name;
                    categoryTitle.style.margin = '15px 0 10px 0';
                    categoryTitle.style.color = '#666';
                    menuDiv.appendChild(categoryTitle);
                    
                    items.forEach(item => {
                        const itemDiv = document.createElement('div');
                        itemDiv.className = 'menu-item';
                        itemDiv.innerHTML = `
                            <span>${item.name}</span>
                            <span>¥${item.price}</span>
                            <button onclick="addToCart(${item.id}, '${item.name}', ${item.price})">+</button>
                        `;
                        menuDiv.appendChild(itemDiv);
                    });
                }
            });
        }

        function addToCart(id, name, price) {
            const existing = cart.find(item => item.id === id);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ id, name, price, quantity: 1 });
            }
            updateCart();
        }

        function updateCart() {
            const cartDiv = document.getElementById('cart');
            const totalSpan = document.getElementById('total');
            const submitBtn = document.getElementById('submit-order');
            
            cartDiv.innerHTML = '';
            let total = 0;
            
            cart.forEach(item => {
                total += item.price * item.quantity;
                const itemDiv = document.createElement('div');
                itemDiv.className = 'cart-item';
                itemDiv.innerHTML = `
                    <span>${item.name} × ${item.quantity}</span>
                    <span>¥${item.price * item.quantity}</span>
                `;
                cartDiv.appendChild(itemDiv);
            });
            
            totalSpan.textContent = total;
            submitBtn.disabled = cart.length === 0;
        }

        async function submitOrder() {
            try {
                const orderData = {
                    tableId: 'A01',
                    items: cart.map(item => ({
                        itemId: item.id,
                        name: item.name,
                        price: item.price,
                        quantity: item.quantity
                    }))
                };
                
                const res = await fetch(`${API_BASE}/api/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                
                const data = await res.json();
                if (data.success) {
                    currentOrderId = data.orderId;
                    cart = [];
                    updateCart();
                    document.getElementById('order-status').classList.remove('hidden');
                    checkOrderStatus();
                    alert('✅ 订单提交成功！订单号: ' + data.orderId);
                } else {
                    alert('提交失败: ' + data.error);
                }
            } catch (error) {
                alert('提交订单失败: ' + error.message);
            }
        }

        async function checkOrderStatus() {
            if (!currentOrderId) return;
            
            try {
                const res = await fetch(`${API_BASE}/api/orders/${currentOrderId}`);
                const data = await res.json();
                
                if (data.success) {
                    const order = data.data;
                    const statusDiv = document.getElementById('status-content');
                    statusDiv.innerHTML = `
                        <div class="order-status status-${order.status}">
                            <p><strong>订单号:</strong> ${order.id}</p>
                            <p><strong>状态:</strong> ${order.status === 'preparing' ? '制作中' : '已完成'}</p>
                            <p><strong>下单时间:</strong> ${new Date(order.createdAt).toLocaleString()}</p>
                            ${order.readyAt ? `<p><strong>完成时间:</strong> ${new Date(order.readyAt).toLocaleString()}</p>` : ''}
                        </div>
                    `;
                }
            } catch (error) {
                console.error('检查状态失败:', error);
            }
        }

        async function markAsReady() {
            if (!currentOrderId) return;
            
            try {
                const res = await fetch(`${API_BASE}/api/orders/${currentOrderId}`, {
                    method: 'PUT'
                });
                
                const data = await res.json();
                if (data.success) {
                    alert('✅ 订单已标记为完成！');
                    checkOrderStatus();
                }
            } catch (error) {
                alert('标记失败: ' + error.message);
            }
        }

        // 初始化
        loadMenu();
    </script>
</body>
</html>
